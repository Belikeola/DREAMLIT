<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Header Example</title>
    <style>
        /* This is the key CSS code for the header */
        header {
            position: sticky;        /* Tells the browser to stick the element */
            top: 0;                  /* Locks it exactly at the very top of the window */
            z-index: 1000;           /* Keeps the header layered on top of all body content */
            background-color: #333;  /* Solid background color so text underneath doesn't show through */
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* Temporary styling for page body to allow scrolling */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .content {
            padding: 20px;
            height: 2000px; /* Forces page scroll */
            background: linear-gradient(white, #e0e0e0);
        }
    </style>
</head>
<body>

    <header>
        <h1>My Sticky Website Header</h1>
    </header>

    <div class="content">
        <p>Scroll down to see the header stay completely fixed to the top!</p>
    </div>

    
</body>
</html>
